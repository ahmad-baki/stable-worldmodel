# @package _global_
# Local launcher configuration (no SLURM)

defaults:
  - override /hydra/launcher: basic

n_gpus: ${oc.decode:${oc.env:SLURM_GPUS_ON_NODE,1}}
cpus_per_task: ${oc.decode:${oc.env:SLURM_CPUS_ON_NODE,8}}
cache_dir: null # Use stable-worldmodel default cache
wandb:
  enabled: true
  config:
    entity: ahmad-baki-karlsruhe-institute-of-technology
    project: worldbench
    name: ${output_model_name}
    id: ${hydra:job.id}
    resume: allow
    log_model: False
